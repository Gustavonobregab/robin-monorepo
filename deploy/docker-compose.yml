name: robin

x-app: &app
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: robin-app
  env_file: /opt/robin/shared/.env
  restart: unless-stopped
  networks: [robin-net]
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  api:
    <<: *app
    command: ["bun", "run", "src/server.ts"]
    ports:
      - "127.0.0.1:3000:3002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3002/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    <<: *app
    command: ["bun", "run", "src/worker/index.ts"]
    mem_limit: 3g
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks: [robin-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  robin-net:

volumes:
  redis-data:
