name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'deploy/**'
      - 'package.json'
      - 'bun.lock'

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to VPS (post-receive hook builds and restarts)
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 179.197.226.79 >> ~/.ssh/known_hosts
          git push ssh://robin@179.197.226.79/opt/robin/repo.git HEAD:main
